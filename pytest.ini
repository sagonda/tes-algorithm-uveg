[pytest]
# PyTest Configuration for TES Algorithm UVEG

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marker definitions
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    slow: Slow running tests (deselect with -m "not slow")
    requires_rttov: Tests that require RTTOV to be installed
    requires_rttov_data: Tests that require RTTOV coefficient files

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options
[coverage:run]
source = services,utilities
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */.venv/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

precision = 2
show_missing = True

# Minimum coverage threshold
fail_under = 80
